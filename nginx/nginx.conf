user  nginx;
worker_processes  auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 4096;
  server_tokens off;

  # Для websocket/SSE при необходимости
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend_upstream {
    server frontend:80;
  }

  upstream backend_upstream {
    server backend:3000;
  }

  upstream keycloak_upstream {
    server keycloak:8080;
  }

  server {
    listen 80;
    server_name _;

    # Унифицированные proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # 1) Keycloak под /auth
    location /auth/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://keycloak_upstream;
    }

    # 2) Backend API под /api
    location /api/ {
      proxy_http_version 1.1;
      proxy_pass http://backend_upstream;
    }

    # 3) Legacy backend endpoints (используются фронтом без префикса /api)
    location ~ ^/(requests_transportation|document_types|message_types|signs_sending|countries|legal_entities|ownerships|owners_non_public_railway|approvals_with_owner|cargo_groups|methods_submission|stations|sending|cargo|transport_package_types|rolling_stock_types|contracts|destination_indications|submission_schedules|send_numbers|payers|payer_types|send_types|speed_types)$ {
      proxy_http_version 1.1;
      proxy_pass http://backend_upstream;
    }

    # 4) Frontend (SPA)
    location / {
      proxy_http_version 1.1;
      proxy_pass http://frontend_upstream;
    }
  }
}
